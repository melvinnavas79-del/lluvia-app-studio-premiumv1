name: Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/src/**"
      - "frontend/public/**"
      - "docker-compose.yml"
      - "nginx.conf"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target (production=main, staging=develop)"
        type: choice
        options: [production, staging]
        default: production

jobs:
  deploy-production:
    name: "→ Production (main)"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/lluvia-premiumv1
            git fetch origin
            git checkout main
            git pull origin main
            bash scripts/deploy-production.sh --no-pull
            echo "✓ Production deploy complete"

  deploy-staging:
    name: "→ Staging (develop)"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Deploy staging to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/lluvia-premiumv1
            git fetch origin
            git checkout develop
            git pull origin develop
            BRANCH=develop bash scripts/deploy-production.sh --no-pull
            echo "✓ Staging deploy complete"
